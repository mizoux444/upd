<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تحديث التطبيق</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }

    .card{
      text-align:center;
      background:#111827;
      padding:40px 30px;
      border-radius:20px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
      width:320px;
    }

    .card h1{
      font-size:28px;
      margin-bottom:15px;
      color:#38bdf8;
    }

    .card p{
      font-size:18px;
      margin-bottom:30px;
      color:#d1d5db;
    }

    .update-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:14px 28px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:#fff;
      font-size:18px;
      cursor:pointer;
      text-decoration:none;
      transition:0.3s;
    }

    .update-btn:hover{
      background:#0ea5e9;
      transform:scale(1.05);
    }

    .update-btn i{
      font-size:22px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>يوجد تحديث جديد</h1>
    <p>اضغط على زر التحديث لتحميل آخر إصدار</p>

    <a class="update-btn" href="https://mizouxtv.netlify.app/" target="_blank">
      <i class="fa-solid fa-download"></i>
      تحديث التطبيق
    </a>
  </div>

</body>
</html>
